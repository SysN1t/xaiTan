# xia_tan v2.2 默认黑名单配置
# 格式: 逗号分隔，支持通配符 *（如 *.baidu.com, *.css）

# 域名黑名单（默认跳过的域名，42个）
domain.blacklist=doubleclick.net,wappalyzer.com,mozilla.com,firefox.com,ytimg.com,www.baidu.com,fastly-edge.com,amap.com,googleapis.com,qq.com,hcfy.app,mozilla.net,e.topthink.com,ingest.sentry.io,firefoxchina.cn,servicewechat.com,ceye.io,google.com,google.cn,g-fox.cn,ggpht.com,rss.ink,firefox.com.cn,github.com,raw.githubusercontent.com,netease.com,detectportal.firefox.com,githubassets.com,tencent-cloud.com,mozilla.org,google.co.jp,youtube.com,baidu.com,firefox.cn,bdstatic.com,qlogo.cn,mozilla.cloudflare-dns.com,qpic.cn,webapp.163.com,gstatic.com,fofa.info,api.ipify.org,googleusercontent.com,wx.qlogo.cn

# 路径黑名单（不扫描的文件后缀，98个）
path.blacklist=*.css,*.bin,*.csv,*.eot,*.mpkg,*.xul,*.rmvb,*.midi,*.mov,*.jar,*.3g2,*.mpa,*.ram,*.zip,*.otf,*.rar,*.mpe,*.7z,*.ras,*.mpg,*.png,*.mpp,*.pnm,*.ra,*.au,*.doc,*.odp,*.rm,*.odt,*.aif,*.ods,*.aac,*.xwd,*.log,*.vsd,*.js,*.mid,*.wma,*.cmx,*.arc,*.epub,*.pgm,*.bz,*.jpeg,*.woff2,*.3gp,*.azw,*.wmv,*.xlsx,*.svg,*.rtf,*.snd,*.jfif,*.mpv2,*.ppm,*.docx,*.flv,*.txt,*.xpm,*.ppt,*.asf,*.abw,*.mjs,*.cod,*.swf,*.bmp,*.oga,*.rmi,*.tif,*.ico,*.ics,*.html,*.ogv,*.ogx,*.tar,*.webp,*.webm,*.woff,*.pptx,*.mpeg,*.pbm,*.weba,*.xbm,*.tiff,*.cab,*.gif,*.aiff,*.aifc,*.ief,*.rgb,*.m3u,*.avi,*.bz2,*.jpe,*.jpg,*.htm,*.ttf,*.wav,*.mp2,*.mp4,*.mp3,*.pdf,*.gz,*.csh,*.xls

# 排除参数名（这些参数不参与扫描）
exclude.params=csrf,token,_t,timestamp

# 延时注入阈值（毫秒）
time.threshold=5000

# 域名白名单（空=全部允许）
domain.whitelist=

# 路径白名单（空=全部允许）
path.whitelist=

# 相似度阈值（0.0~1.0）
sim.threshold=0.9
